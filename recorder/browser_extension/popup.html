<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EUIC Recorder Bridge</title>
    <style>
        body {
            margin: 0;
            width: 300px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #121726;
            color: #e8ecf7;
        }
        .wrap {
            padding: 14px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 14px;
            font-weight: 700;
        }
        .hint {
            font-size: 12px;
            color: #a9b3cb;
            margin-bottom: 10px;
            line-height: 1.35;
        }
        .field {
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: #c9d2e7;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #2f3b5e;
            background: #1a2135;
            color: #e8ecf7;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
        }
        select {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #2f3b5e;
            background: #1a2135;
            color: #e8ecf7;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
        }
        .btn {
            width: 100%;
            border: 0;
            border-radius: 8px;
            padding: 9px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .btn-primary {
            background: #3568ff;
            color: #fff;
        }
        .btn-secondary {
            background: #26304c;
            color: #e8ecf7;
            border: 1px solid #33415f;
        }
        #status {
            min-height: 18px;
            font-size: 12px;
            color: #9ad08f;
        }
        textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #2f3b5e;
            background: #1a2135;
            color: #e8ecf7;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            min-height: 92px;
            resize: vertical;
        }
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        #replay-input {
            min-height: 72px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>EUIC Recorder Bridge</h1>
        <div class="hint">Sla meerdere replay links op en stuur ze in één keer naar je lokale API.</div>

        <div class="field">
            <label for="team-select">Team</label>
            <select id="team-select" aria-label="Selecteer team"></select>
        </div>

        <div class="field">
            <label for="replay-input">Replay URL(s)</label>
            <textarea id="replay-input" placeholder="Plak 1 of meerdere replay links..."></textarea>
        </div>

        <div class="btn-row">
            <button id="save-replay" class="btn btn-secondary" type="button">Voeg toe</button>
            <button id="send-replays" class="btn btn-primary" type="button">Stuur naar API</button>
        </div>

        <div class="field">
            <label for="replay-list">Opgeslagen replays (1 per regel)</label>
            <textarea id="replay-list" placeholder="https://replay.pokemonshowdown.com/...\nhttps://replay.pokemonshowdown.com/..."></textarea>
        </div>
        <div id="status"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
