<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EUIC Recorder Bridge</title>
    <style>
        body {
            margin: 0;
            width: 300px;
            font-family: "Nunito", "Trebuchet MS", sans-serif;
            background:
                radial-gradient(180px 120px at 100% 0, rgba(255, 208, 70, 0.28), transparent 64%),
                linear-gradient(180deg, #173d86 0%, #122f6e 42%, #10265a 100%);
            color: #fff8e1;
        }
        .wrap {
            padding: 14px;
            border: 1px solid #295399;
            border-radius: 12px;
            margin: 8px;
            box-shadow: 0 14px 28px rgba(7, 12, 34, 0.34);
            background: rgba(16, 37, 88, 0.72);
        }
        h1 {
            margin: 0 0 10px;
            font-size: 14px;
            font-weight: 800;
            color: #ffe062;
            text-shadow: 2px 2px 0 #1b2f69;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .hint {
            font-size: 12px;
            color: #dce7ff;
            margin-bottom: 10px;
            line-height: 1.35;
        }
        .field {
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: #fff2b7;
            font-weight: 700;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #315ca3;
            background: #17356f;
            color: #fff8e1;
            border-radius: 10px;
            padding: 8px;
            font-size: 12px;
        }
        select {
            width: 100%;
            box-sizing: border-box;
            border: 2px solid #ffd24a;
            background: #17356f;
            color: #fff8e1;
            border-radius: 10px;
            padding: 8px;
            font-size: 12px;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            padding-right: 38px;
            background-image:
                linear-gradient(45deg, transparent 50%, #17356f 50%),
                linear-gradient(135deg, #17356f 50%, transparent 50%),
                linear-gradient(180deg, #f7efcd 0%, #efe4b4 100%);
            background-position:
                calc(100% - 18px) calc(50% + 1px),
                calc(100% - 12px) calc(50% + 1px),
                100% 0;
            background-size:
                6px 6px,
                6px 6px,
                42px 100%;
            background-repeat: no-repeat;
            cursor: pointer;
        }
        select option {
            background: #1a3f83;
            color: #fff8e1;
        }
        select option:checked {
            background: #ffd24a;
            color: #17356f;
        }
        .btn {
            width: 100%;
            border: 2px solid #2b58a4;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 8px;
            transition: transform 0.16s ease, filter 0.16s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .btn-primary {
            background: linear-gradient(180deg, #ffd850 0%, #ffbf1a 100%);
            color: #163673;
            border-color: #124f9d;
        }
        .btn-secondary {
            background: linear-gradient(180deg, #edf3ff 0%, #dce7ff 100%);
            color: #183b79;
            border-color: #2e5ba5;
        }
        #status {
            min-height: 18px;
            font-size: 12px;
            color: #d5ffe3;
            font-weight: 700;
        }
        textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #315ca3;
            background: #17356f;
            color: #fff8e1;
            border-radius: 10px;
            padding: 8px;
            font-size: 12px;
            min-height: 92px;
            resize: vertical;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #ffcb05;
            box-shadow: 0 0 0 3px rgba(255, 203, 5, 0.2);
        }
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        #replay-input {
            min-height: 72px;
        }
        .poke-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            background: linear-gradient(180deg, #ef4c44 0 47%, #fff5d9 47% 56%, #ffffff 56% 100%);
            border: 1px solid #143674;
            position: relative;
        }
        .poke-dot::after {
            content: "";
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #fff0bf;
            border: 1px solid #143674;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .activity-box {
            border: 1px solid #315ca3;
            border-radius: 10px;
            background: rgba(11, 30, 74, 0.78);
            max-height: 150px;
            overflow: auto;
            padding: 6px;
        }
        .activity-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 6px;
        }
        .activity-item {
            border: 1px solid rgba(78, 121, 194, 0.55);
            border-radius: 8px;
            padding: 6px;
            background: rgba(20, 52, 120, 0.6);
        }
        .activity-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: #dce7ff;
            margin-bottom: 2px;
        }
        .activity-status {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .activity-status.sent {
            color: #b8ffd0;
        }
        .activity-status.queued {
            color: #ffe69a;
        }
        .activity-status.dropped,
        .activity-status.error {
            color: #ffd0cc;
        }
        .activity-preview {
            font-size: 11px;
            line-height: 1.3;
            color: #fff8e1;
            word-break: break-word;
        }
        .activity-empty {
            font-size: 11px;
            color: #dce7ff;
            opacity: 0.85;
            padding: 4px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1><span class="poke-dot" aria-hidden="true"></span>EUIC Recorder Bridge</h1>
        <div class="hint">Sla meerdere replay links op en stuur ze in één keer naar je lokale API.</div>

        <div class="field">
            <label for="team-select">Team</label>
            <select id="team-select" aria-label="Selecteer team"></select>
        </div>

        <div class="field">
            <label for="replay-input">Replay URL(s)</label>
            <textarea id="replay-input" placeholder="Plak 1 of meerdere replay links..."></textarea>
        </div>

        <div class="btn-row">
            <button id="save-replay" class="btn btn-secondary" type="button">Voeg toe</button>
            <button id="send-replays" class="btn btn-primary" type="button">Stuur naar API</button>
        </div>

        <div class="field">
            <label for="replay-list">Opgeslagen replays (1 per regel)</label>
            <textarea id="replay-list" placeholder="https://replay.pokemonshowdown.com/...\nhttps://replay.pokemonshowdown.com/..."></textarea>
        </div>

        <div class="field">
            <label>Recent verzonden</label>
            <div class="activity-box">
                <ul id="activity-list" class="activity-list"></ul>
                <div id="activity-empty" class="activity-empty">Nog geen verzendactiviteit.</div>
            </div>
        </div>
        <div id="status"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
